name: publish to PyPI

# Publica al empujar un tag v* (p.ej. v0.1.0). Trusted publishing (OIDC): sin
# token en secretos — PyPI confía en este repo+workflow. Requiere configurar el
# "pending publisher" en pypi.org una sola vez (owner, repo, workflow=publish.yml,
# environment=pypi).
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    name: build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI trusted publishing (OIDC), sin token en secretos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
