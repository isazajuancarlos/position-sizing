name: tests

# La librería no tiene dependencias y el cálculo es aritmética decimal pura, así
# que la matriz solo necesita cubrir los extremos del rango soportado: si pasa en
# la más vieja y en la más nueva, el medio no aporta información.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip && pip install -e ".[test]"
      - run: python -m pytest -q
